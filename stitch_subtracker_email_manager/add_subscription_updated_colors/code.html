<div class="flex items-center gap-stack-sm">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md text-on-surface">Add Subscription</h1>
</div>

</div>
</header>
<main class="max-w-[1200px] mx-auto px-container-margin pt-stack-sm">

<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">search</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-none rounded-xl text-body-md font-body-md focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant" placeholder="Search services (e.g. Netflix, Spotify)" type="text"/>
</div>
</section>
<!-- Popular Services Grid -->
<section class="mb-stack-lg">
<h2 class="text-label-md font-label-md text-on-surface-variant mb-stack-md">POPULAR SERVICES</h2>
<div class="grid grid-cols-2 md:grid-cols-4 gap-gutter">
<!-- Netflix -->
<button class="group flex flex-col items-center justify-center p-stack-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] hover:shadow-lg transition-all border border-transparent hover:border-primary/10">
<div class="w-12 h-12 rounded-full bg-error-container flex items-center justify-center mb-stack-sm group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-error" data-weight="fill">play_circle</span>
</div>
<span class="text-label-md font-label-md">Netflix</span>
</button>
<!-- YouTube -->
<button class="group flex flex-col items-center justify-center p-stack-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] hover:shadow-lg transition-all border border-transparent hover:border-primary/10">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center mb-stack-sm group-active:scale-95 transition-transform"><span class="material-symbols-outlined text-primary" data-weight="fill">smart_display</span></div>
<span class="text-label-md font-label-md">YouTube Premium</span>
</button>
<!-- iCloud -->
<button class="group flex flex-col items-center justify-center p-stack-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] hover:shadow-lg transition-all border border-transparent hover:border-primary/10">

</button>

<button class="group flex flex-col items-center justify-center p-stack-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] hover:shadow-lg transition-all border border-transparent hover:border-primary/10">
<div class="w-12 h-12 rounded-full bg-tertiary-fixed flex items-center justify-center mb-stack-sm group-active:scale-95 transition-transform"><span class="material-symbols-outlined text-tertiary" data-weight="fill">audio_file</span></div>
<span class="text-label-md font-label-md">Spotify</span>
</button>
</div>
</section>

<section class="max-w-xl mx-auto">
<div class="glass-card p-stack-lg rounded-[24px] shadow-sm">
<div class="space-y-stack-lg">
<!-- Price Input -->
<div>
<label class="block text-label-sm font-label-sm text-on-surface-variant mb-stack-sm">MONTHLY PRICE</label>

<span class="absolute left-4 top-1/2 -translate-y-1/2 text-headline-md font-headline-md text-on-surface">$</span>
<input class="w-full pl-10 pr-4 py-4 bg-surface-container-low border-none rounded-xl text-headline-md font-headline-md focus:ring-2 focus:ring-primary/20 placeholder:text-outline-variant" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Billing Cycle Chips -->
<div>
<label class="block text-label-sm font-label-sm text-on-surface-variant mb-stack-sm">BILLING CYCLE</label>
<div class="flex gap-stack-sm">
<button class="flex-1 py-3 px-4 rounded-full bg-primary-container text-on-primary-container font-label-md text-label-md shadow-md transition-all active:scale-95">

                            </button>
<button class="flex-1 py-3 px-4 rounded-full bg-surface-container-high text-on-surface-variant font-label-md text-label-md hover:bg-surface-container-highest transition-all active:scale-95">
                                Yearly
                            </button>
</div>
</div>
<!-- Date Picker -->
<div>
<label class="block text-label-sm font-label-sm text-on-surface-variant mb-stack-sm">FIRST PAYMENT DATE</label>
<div class="relative">
<input class="w-full px-4 py-4 bg-surface-container-low border-none rounded-xl text-body-md font-body-md focus:ring-2 focus:ring-primary/20" type="date"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline pointer-events-none">calendar_today</span>
</div>
</div>

<div>
<label class="block text-label-sm font-label-sm text-on-surface-variant mb-stack-sm">CATEGORY</label>
<select class="w-full px-4 py-4 bg-surface-container-low border-none rounded-xl text-body-md font-body-md focus:ring-2 focus:ring-primary/20 appearance-none">
<option>Streaming</option>
<option>Work &amp; Productivity</option>
<option>Utilities</option>
<option>Health &amp; Fitness</option>
</select>
</div>
