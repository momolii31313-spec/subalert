<label class="font-label-md text-label-md text-on-surface-variant px-1">Full name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-md py-sm focus:ring-2 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/50 transition-all" placeholder="Budi Santoso" type="text"/>
</div>
</div>
<!-- Email Address Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1">Email address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-md py-sm focus:ring-2 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/50 transition-all" placeholder="budi@example.com" type="email"/>
</div>
</div>

<label class="font-label-md text-label-md text-on-surface-variant px-1">Create password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-md py-sm focus:ring-2 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/50 transition-all" placeholder="••••••••" type="password"/>

<span class="material-symbols-outlined text-[20px]">visibility</span>

</div>

<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-md rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-transform">
